services:
  db:
    image: postgres:16-alpine
    container-name: inventario-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: inventariodb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container-name: inventariodb
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: inventariodb
    ports:
      - "8080:8080"
    depends_on:
      - db
    restart: unless-stopped
  
  volumes:
    - postgres_data:/var/lib/postgresql/data
